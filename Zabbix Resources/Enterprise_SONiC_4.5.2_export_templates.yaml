zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 6bb6c47417cb49efbdce4ce08ed89cab
      name: 'Network devices'
  templates:
    - uuid: af66af78fc5042c5843d2b9214e136f1
      template: 'SONiC Switch M2-W6510-32C'
      name: 'SONiC Switch M2-W6510-32C'
      description: |
        Custom template for SONiC 4.x 32x100G switch (M2-W6510-32C)
        Monitors: CPU, Memory, Temperature, Fan, Port Status, Optical DDM, Docker
        SNMP v2c + Zabbix Agent2 (Docker requires zabbix-agent2 on SONiC)
      groups:
        - name: 'Network devices'
      items:
        - uuid: 34c4d79d01fb4d7fad33f5fdca82f94c
          name: 'BGP Local AS'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.15.2.0
          key: bgp.local.as
          delay: 1h
          history: 30d
        - uuid: bdfb8224646e4435b8aa213eaecd263b
          name: 'BGP Peer Count'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.15.3]'
          key: bgp.peer.count
          delay: 60s
          history: 30d
        - uuid: 844c801978f245fa874f91a0fe9095ad
          name: 'CPU idle %'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.11.0
          key: cpu.idle
          delay: 60s
          history: 30d
          value_type: FLOAT
          units: '%'
        - uuid: cef6b042b5424593a90c3a93d070e415
          name: 'CPU iowait %'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.54.0
          key: cpu.iowait
          delay: 60s
          history: 30d
          value_type: FLOAT
          units: '%'
        - uuid: 9b42a79eff1e413a99252ac3866aa162
          name: 'CPU system %'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.10.0
          key: cpu.system
          delay: 60s
          history: 30d
          value_type: FLOAT
          units: '%'
        - uuid: 3ed7667cb93d4581abc03936d41a8e6f
          name: 'CPU usage %'
          type: CALCULATED
          key: cpu.usage
          delay: 60s
          history: 30d
          value_type: FLOAT
          units: '%'
          params: '100 - last(//cpu.idle)'
          triggers:
            - uuid: 8faba4477ac541c3babab71803199864
              expression: 'last(/SONiC Switch M2-W6510-32C/cpu.usage)>95'
              name: 'CPU usage critical (>95%)'
              priority: HIGH
            - uuid: caea9d4c9526451e9230d10d5325b677
              expression: 'last(/SONiC Switch M2-W6510-32C/cpu.usage)>90'
              name: 'CPU usage high (>90%)'
