name: Sync config files into Testbed1

on:
  push:
    paths:
      - 'Prometheus Resources/snmp.yml'
      - 'Prometheus Resources/scrape_configs.yml'
      - 'Prometheus Resources/rules.yml'
      - 'Prometheus Resources/dashboard.json'
      - 'Testbed1 - snmp-exporter - Enterprise SONiC.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject all configs
        run: |
          python3 - <<'PYEOF'
import re

def inject(readme, start_tag, end_tag, filepath, lang):
    try:
        content = open(filepath).read()
    except FileNotFoundError:
        print(f"Skipping {filepath} - not found")
        return readme
    block = f"<!-- {start_tag} -->\n```{lang}\n{content}\n```\n<!-- {end_tag} -->"
    return re.sub(
        rf"<!-- {start_tag} -->.*?<!-- {end_tag} -->",
        block,
        readme,
        flags=re.DOTALL
    )

readme_path = "Testbed1 - snmp-exporter - Enterprise SONiC.md"

with open(readme_path) as f:
    readme = f.read()

readme = inject(readme, "SNMP_YML_START",       "SNMP_YML_END",       "Prometheus Resources/snmp.yml",           "yaml")
readme = inject(readme, "PROMETHEUS_YML_START", "PROMETHEUS_YML_END", "Prometheus Resources/scrape_configs.yml", "yaml")
readme = inject(readme, "RULES_YML_START",      "RULES_YML_END",      "Prometheus Resources/rules.yml",          "yaml")
readme = inject(readme, "DASHBOARD_JSON_START", "DASHBOARD_JSON_END", "Prometheus Resources/dashboard.json",     "json")

with open(readme_path, "w") as f:
    f.write(readme)

print("Done")
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Testbed1 - snmp-exporter - Enterprise SONiC.md"
          git diff --staged --quiet || git commit -m "chore: sync config files into Testbed1"
          git push
